plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.kangleiinovations.dinepos"
    compileSdk = 34  // Use a single, consistent compileSdk declaration
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.kangleiinovations.dinepos"
        minSdk = 22
        targetSdk = 34
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // Release signing: reads keystore from a properties file if present,
            // otherwise falls back to debug signing for local dev builds.
            // Create `key.properties` with storeFile/storePassword/keyAlias/keyPassword
            // to ship signed release builds.
            def keystoreProperties = new Properties()
            def keystorePropertiesFile = rootProject.file('key.properties')
            if (keystorePropertiesFile.exists()) {
                keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
                signingConfig = signingConfigs.create('release') {
                    storeFile = file(keystoreProperties['storeFile'])
                    storePassword = keystoreProperties['storePassword']
                    keyAlias = keystoreProperties['keyAlias']
                    keyPassword = keystoreProperties['keyPassword']
                }
            } else {
                signingConfig = signingConfigs.debug
            }
        }
    }
}

flutter {
    source = "../.."
}
